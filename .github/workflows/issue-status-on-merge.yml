name: Mark linked issues done

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  mark-linked-issues-done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to status:done
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const closingRegex =
              /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+(?:https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/(\d+)|([A-Za-z0-9_.-]+)\/([A-Za-z0-9_.-]+)#(\d+)|#(\d+))/gi;

            const issueTargets = new Map();
            let match;
            while ((match = closingRegex.exec(body)) !== null) {
              if (match[1]) issueTargets.set(`${owner}/${repo}#${match[1]}`, { owner, repo, number: Number(match[1]) });
              if (match[2] && match[3] && match[4]) issueTargets.set(`${match[2]}/${match[3]}#${match[4]}`, { owner: match[2], repo: match[3], number: Number(match[4]) });
              if (match[5]) issueTargets.set(`${owner}/${repo}#${match[5]}`, { owner, repo, number: Number(match[5]) });
            }

            for (const target of issueTargets.values()) {
              const { data: issue } = await github.rest.issues.get({
                owner: target.owner,
                repo: target.repo,
                issue_number: target.number
              });

              const labels = (issue.labels || [])
                .map((l) => (typeof l === "string" ? l : l.name))
                .filter((name) => name && !name.startsWith("status:"));

              labels.push("status:done");

              await github.rest.issues.setLabels({
                owner: target.owner,
                repo: target.repo,
                issue_number: target.number,
                labels
              });
            }
